name: Local To Cloud Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-suite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]

    env:
      APP_ENVIRONMENT: staging
    steps:
      - name: Clone Repository Data
        uses: actions/checkout@v4

      - name: Initialize Node Runtime (Version ${{ matrix.node-version }})
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Project Dependencies
        run: npm ci

      - name: Execute Automated Tests
        run: npm test
        env:
          DEBUG_LOGS: true

      - name: Package Production Distribution Bundle
        run: |
          mkdir -p dist
          cp index.js package.json dist/
          echo "Build metadata: Env=${{ env.APP_ENVIRONMENT }}, Node Version=${{ matrix.node-version }}" > dist/build-info.txt

      - name: Preserve Build Artifact Asset
        uses: actions/upload-artifact@v4
        with:
          name: distribution-package-node-${{ matrix.node-version }}
          path: dist/
          retention-days: 5