name: Local to Cloud Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository Data
        uses: actions/checkout@v4

      - name: Verify Workspace Files
        run: |
          echo "Current working directory path:"
          pwd
          echo "Listing all files inside the workspace:"
          ls -la
